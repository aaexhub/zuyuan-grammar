<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祖源语法学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.5s ease;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6c757d;
        }
        
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            display: none;
        }
        
        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        
        .options {
            margin-bottom: 20px;
        }
        
        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .option.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }
        
        .option.wrong {
            border-color: #dc3545;
            background: #dc3553;
            color: white;
        }
        
        .explanation {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .explanation-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #856404;
        }
        
        .explanation-text {
            color: #856404;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            flex: 1;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5a67d8;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover:not(:disabled) {
            background: #218838;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }
        
        .start-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        .start-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .start-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        
        .result-card {
            display: none;
            background: linear-gradient(135deg, #00c853 0%, #00bfa5 100%);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .result-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .result-detail {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
                flex: 1;
                padding: 15px;
                background: #e9ecef;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: #495057;
                transition: all 0.3s ease;
            }
            
            .tab.active {
                background: #667eea;
                color: white;
            }
        
        .mistakes-section {
            margin-top: 30px;
        }
        
        .mistakes-section h3 {
            color: #495057;
            margin-bottom: 15px;
        }
        
        .mistakes-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .mistake-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .mistake-checkbox {
            margin-top: 3px;
            cursor: pointer;
        }
        
        .mistake-content {
            flex: 1;
        }
        
        .mistake-question {
            color: #495057;
            margin-bottom: 5px;
        }
        
        .mistake-answer {
            font-size: 12px;
            color: #6c757d;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .container {
                border-radius: 0;
            }
            
            .content {
                padding: 20px;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .mistakes-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 祖源语法学习系统</h1>
            <div class="subtitle">每天5题，从易到难，稳扎稳打</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="content">
            <!-- 简化的跨平台同步面板 -->
            <div class="sync-panel" style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 12px; padding: 20px; margin-bottom: 30px;">
                <h3 style="margin-bottom: 15px; color: #1976d2;">🔄 跨平台同步 (GitHub Gist)</h3>
                <div style="margin-bottom: 15px;">
                    <button class="btn btn-primary btn-small" onclick="exportData()">📤 导出数据</button>
                    <button class="btn btn-success btn-small" onclick="importData()">📥 导入数据</button>
                </div>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">
                    💡 提示： 导出数据后，复制到 <a href="https://gist.github.com/aaexhub/e3270ff596ed3af3972d7d751c32e7a9" target="_blank" style="color: #1976d2;">您的Gist</a>， 在其他设备上导入即可同步
                </p>
            </div>
            
            <div class="tab-container">
                <button class="tab active" onclick="switchMode('daily')">📝 每日练习</button>
                <button class="tab" onclick="switchMode('mistakes')">❌ 错题本</button>
            </div>
            
            <!-- 每日练习 -->
            <div id="dailyMode">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCompleted">0</div>
                        <div class="stat-label">已完成题目</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="accuracyRate">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">总题目数</div>
                    </div>
                </div>
                
                <div class="start-card" id="startCard">
                    <div class="start-icon">📖</div>
                    <div class="start-text" id="startText">开始今日练习</div>
                    <button class="btn btn-primary" onclick="startDaily()">开始练习</button>
                </div>
                
                <div class="question-card" id="questionCard">
                    <div class="question-number" id="questionNumber"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="explanation" id="explanation">
                        <div class="explanation-title">💡 解析</div>
                        <div class="explanation-text" id="explanationText"></div>
                    </div>
                    <div class="buttons">
                        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">检查答案</button>
                        <button class="btn btn-success" id="nextBtn" onclick="nextQuestion()" style="display:none">下一题</button>
                    </div>
                </div>
                
                <div class="result-card" id="resultCard">
                    <div class="result-icon">🎉</div>
                    <div class="result-text">今日任务完成！</div>
                    <div class="result-detail" id="resultDetail"></div>
                    <button class="btn btn-primary" onclick="startDaily()">继续练习</button>
                </div>
            </div>
            
            <!-- 错题本 -->
            <div id="mistakesMode" style="display:none">
                <div class="start-card" id="mistakeStartCard">
                    <div class="start-icon">❌</div>
                    <div class="start-text" id="mistakeStartText">暂无错题，继续加油！</div>
                    <button class="btn btn-warning" id="startMistakeBtn" onclick="startMistakePractice()" style="display:none">开始重做错题</button>
                </div>
                
                <div class="question-card" id="mistakeQuestionCard">
                    <div class="question-number" id="mistakeQuestionNumber"></div>
                    <div class="question-text" id="mistakeQuestionText"></div>
                    <div class="options" id="mistakeOptionsContainer"></div>
                    <div class="explanation" id="mistakeExplanation">
                        <div class="explanation-title">💡 解析</div>
                        <div class="explanation-text" id="mistakeExplanationText"></div>
                    </div>
                    <div class="buttons">
                        <button class="btn btn-primary" id="mistakeCheckBtn" onclick="checkMistakeAnswer()">检查答案</button>
                        <button class="btn btn-success" id="mistakeNextBtn" onclick="nextMistakeQuestion()" style="display:none">下一题</button>
                        <button class="btn btn-secondary" id="backToMistakesBtn" onclick="backToMistakes()" style="display:none">返回错题本</button>
                    </div>
                </div>
                
                <div class="mistakes-section" id="mistakesSection"></div>
            </div>
        </div>
    </div>
    
    <script src="questions.json"></script>
    <script>
        // 简化的跨平台同步函数
        function exportData() {
            const data = getStorageData();
            const jsonStr = JSON.stringify(data, null, 2);
            
            // 复制到剪贴板
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert('✅ 数据已复制到剪贴板！\n\n请按以下步骤同步：\n\n1. 打开 https://gist.github.com/aaexhub/e3270ff596ed3af3972d7d751c32e7a9\n2. 点击"Edit"\n3. 粘贴数据\n4. 点击"Update secret gist"\n\n同步完成！👍');
            }).catch(() => {
                // 降级方案：显示文本框
                const textArea = document.createElement('textarea');
                textArea.value = jsonStr;
                textArea.style.width = '100%';
                textArea.style.height = '300px';
                textArea.style.marginTop = '10px';
                
                const container = document.createElement('div');
                container.innerHTML = '<p>请复制以下数据，保存到您的Gist:</p>';
                container.appendChild(textArea);
                
                const win = window.open('', '_blank');
                win.document.body.appendChild(container);
            });
        }
        
        function importData() {
            const dataStr = prompt('请粘贴从Gist复制的数据:');
            
            if (!dataStr || dataStr.trim() === '') {
                alert('❌ 未输入数据');
                return;
            }
            
            try {
                const data = JSON.parse(dataStr);
                localStorage.setItem('grammarData', JSON.stringify(data));
                alert('✅ 数据导入成功！\n\n页面将刷新...');
                location.reload();
            } catch (e) {
                alert('❌ 数据格式错误，请检查JSON格式\n\n错误信息: ' + e.message);
            }
        }
    </script>
</body>
</html>
