<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祖源语法学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.5s ease;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6c757d;
        }
        
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            display: none;
        }
        
        .question-number {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #212529;
            margin-bottom: 20px;
        }
        
        .options {
            display: grid;
            gap: 12px;
        }
        
        .option {
            background: white;
            border: 2px solid #dee2e6;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .option.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }
        
        .option.wrong {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }
        
        .explanation {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .explanation-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 5px;
        }
        
        .explanation-text {
            color: #856404;
            font-size: 14px;
            white-space: pre-line;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #856404;
        }
        
        .btn-warning:hover {
            background: #e0a800;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-card {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .result-text {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .result-detail {
            color: #6c757d;
            margin-bottom: 30px;
        }
        
        .mistakes-section {
            margin-top: 30px;
        }
        
        .mistakes-section h3 {
            margin-bottom: 15px;
            color: #212529;
        }
        
        .mistakes-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mistake-item {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        
        .mistake-checkbox {
            margin-top: 3px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .mistake-content {
            flex: 1;
        }
        
        .mistake-question {
            font-weight: bold;
            color: #721c24;
            margin-bottom: 5px;
        }
        
        .mistake-answer {
            font-size: 14px;
            color: #721c24;
            margin-bottom: 10px;
        }
        
        .mistake-actions-inline {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            flex: 0;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-easy {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-hard {
            background: #f8d7da;
            color: #721c24;
        }
        
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-tab {
            flex: 1;
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mode-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .start-card {
            text-align: center;
            padding: 40px;
        }
        
        .start-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .start-text {
            font-size: 18px;
            color: #6c757d;
            margin-bottom: 30px;
        }
        
        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .container {
                box-shadow: none;
                max-width: 100%;
            }
            
            .header,
            .stats,
            .mode-tabs,
            .start-card,
            .question-card,
            .result-card,
            .mistakes-actions,
            .btn,
            .mistake-checkbox,
            .mistake-actions-inline {
                display: none !important;
            }
            
            .mistakes-section {
                margin-top: 0;
            }
            
            .mistake-item {
                page-break-inside: avoid;
                background: white;
                border-left: 3px solid #000;
                padding: 10px;
                margin-bottom: 15px;
            }
            
            .mistake-question {
                color: black;
                font-size: 14px;
            }
            
            .mistake-answer {
                color: #333;
                font-size: 12px;
            }
        }
        
        @media screen {
            .print-only {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 祖源语法学习系统</h1>
            <div class="subtitle">每天5题，从易到难，稳扎稳打</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="content">
            <!-- 统计卡片 -->

        <!-- 跨平台同步面板 -->
        <div class="sync-panel" style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 12px; padding: 20px; margin-bottom: 30px;">
            <h3 style="margin-bottom: 15px; color: #1976d2;">🔄 跨平台同步</h3>
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <span>
                    状态: <span id="syncStatus" style="font-weight: bold;">检查中...</span>
                    <span id="syncUsername" style="font-weight: bold; color: #1976d2; display: none;"></span>
                </span>
                <div style="flex: 1;"></div>
                <button id="createAccountBtn" class="btn btn-primary btn-small" onclick="createAccount()" style="display: none;">
                    创建账号
                </button>
                <button id="loginBtn" class="btn btn-secondary btn-small" onclick="login()" style="display: none;">
                    登录
                </button>
                <button id="logoutBtn" class="btn btn-danger btn-small" onclick="logout()" style="display: none;">
                    登出
                </button>
            </div>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">
                💡 提示：创建账号后，记住用户名，即可在任何设备上同步练习进度
            </p>
        </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">总完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="mistakeCount">0</div>
                    <div class="stat-label">错题数</div>
                </div>
            </div>
            
            <!-- 模式选择 -->
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('daily')">📝 每日练习</div>
                <div class="mode-tab" onclick="switchMode('mistakes')">❌ 错题本</div>
            </div>
            
            <!-- 每日练习 -->
            <div id="dailyMode">
                <!-- 开始卡片 -->
                <div class="start-card" id="startCard">
                    <div class="start-icon">📚</div>
                    <div class="start-text">准备好了吗？每天5题，稳步提升语法水平！</div>
                    <button class="btn btn-primary" onclick="startDaily()">开始学习</button>
                </div>
                
                <!-- 题目卡片 -->
                <div class="question-card" id="questionCard">
                    <div class="question-number" id="questionNumber"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="explanation" id="explanation">
                        <div class="explanation-title">💡 解析</div>
                        <div class="explanation-text" id="explanationText"></div>
                    </div>
                    <div class="buttons">
                        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">检查答案</button>
                        <button class="btn btn-success" id="nextBtn" onclick="nextQuestion()" style="display:none">下一题</button>
                    </div>
                </div>
                
                <!-- 结果卡片 -->
                <div class="result-card" id="resultCard">
                    <div class="result-icon">🎉</div>
                    <div class="result-text">今日任务完成！</div>
                    <div class="result-detail" id="resultDetail"></div>
                    <button class="btn btn-primary" onclick="startDaily()">继续练习</button>
                </div>
            </div>
            
            <!-- 错题本 -->
            <div id="mistakesMode" style="display:none">
                <div class="start-card" id="mistakeStartCard">
                    <div class="start-icon">❌</div>
                    <div class="start-text" id="mistakeStartText">暂无错题，继续加油！</div>
                    <button class="btn btn-warning" id="startMistakeBtn" onclick="startMistakePractice()" style="display:none">开始重做错题</button>
                </div>
                
                <div class="question-card" id="mistakeQuestionCard">
                    <div class="question-number" id="mistakeQuestionNumber"></div>
                    <div class="question-text" id="mistakeQuestionText"></div>
                    <div class="options" id="mistakeOptionsContainer"></div>
                    <div class="explanation" id="mistakeExplanation">
                        <div class="explanation-title">💡 解析</div>
                        <div class="explanation-text" id="mistakeExplanationText"></div>
                    </div>
                    <div class="buttons">
                        <button class="btn btn-primary" id="mistakeCheckBtn" onclick="checkMistakeAnswer()">检查答案</button>
                        <button class="btn btn-success" id="mistakeNextBtn" onclick="nextMistakeQuestion()" style="display:none">下一题</button>
                        <button class="btn btn-secondary" id="backToMistakesBtn" onclick="backToMistakes()" style="display:none">返回错题本</button>
                    </div>
                </div>
                
                <div class="mistakes-section" id="mistakesSection"></div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestion = null;
        let currentIndex = 0;
        let todayQuestions = [];
        let selectedOption = null;
        let currentMode = 'daily';
        
        // 错题练习相关
        let mistakeQuestions = [];
        let mistakeIndex = 0;
        let currentMistakeQuestion = null;
        let selectedMistakeOption = null;
        
        // 加载题目数据
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                questions = await response.json();
                console.log(`加载了 ${questions.length} 道题目`);
                initApp();
            } catch (error) {
                console.error('加载题目失败:', error);
                alert('题目加载失败，请刷新页面重试');
            }
        }
        
        // 初始化应用
        function initApp() {
            updateStats();
            
            const data = getStorageData();
            if (data.todayCompleted >= 5) {
                showResult();
            }
        }
        
        // 更新统计
        function updateStats() {
            const data = getStorageData();
            document.getElementById('todayCount').textContent = data.todayCompleted;
            document.getElementById('totalCount').textContent = data.totalCompleted;
            document.getElementById('mistakeCount').textContent = data.mistakes.length;
            
            const progress = (data.todayCompleted / 5) * 100;
            document.getElementById('progressFill').style.width = `${Math.min(progress, 100)}%`;
        }
        
        // 获取存储数据
        function getStorageData() {
            const defaultData = {
                todayCompleted: 0,
                totalCompleted: 0,
                lastDate: '',
                completedQuestions: [],
                recentQuestions: [],
                mistakes: []
            };
            
            const stored = localStorage.getItem('grammarData');
            if (!stored) return defaultData;
            
            const data = JSON.parse(stored);
            const today = new Date().toDateString();
            
            if (data.lastDate !== today) {
                data.todayCompleted = 0;
                data.lastDate = today;
                data.recentQuestions = data.recentQuestions.filter(item => {
                    const daysDiff = (Date.now() - item.date) / (1000 * 60 * 60 * 24);
                    return daysDiff < 10;
                });
                saveStorageData(data);
            }
            
            return data;
        }
        
        // 保存存储数据
        function saveStorageData(data) {
            localStorage.setItem('grammarData', JSON.stringify(data));
        }
            
            // 自动同步到云端
            if (typeof autoSync === "function") {
                autoSync();
            }
        
        // 开始每日练习
        function startDaily() {
            const data = getStorageData();
            
            if (data.todayCompleted >= 5) {
                showResult();
                return;
            }
            
            todayQuestions = selectDailyQuestions(data);
            currentIndex = 0;
            
            document.getElementById('startCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'none';
            showQuestion();
        }
        
        // 选择每日题目
        function selectDailyQuestions(data) {
            const easyQuestions = questions.filter(q => q.difficulty === 'easy');
            const mediumQuestions = questions.filter(q => q.difficulty === 'medium');
            const hardQuestions = questions.filter(q => q.difficulty === 'hard');
            
            const recentIds = data.recentQuestions.map(item => item.id);
            const completedIds = data.completedQuestions;
            
            const available = (q) => !recentIds.includes(q.id) && !completedIds.includes(q.id);
            
            const availableEasy = easyQuestions.filter(available);
            const availableMedium = mediumQuestions.filter(available);
            const availableHard = hardQuestions.filter(available);
            
            const selected = [];
            
            for (let i = 0; i < 2 && availableEasy.length > 0; i++) {
                const rand = Math.floor(Math.random() * availableEasy.length);
                selected.push(availableEasy.splice(rand, 1)[0]);
            }
            
            for (let i = 0; i < 2 && availableMedium.length > 0; i++) {
                const rand = Math.floor(Math.random() * availableMedium.length);
                selected.push(availableMedium.splice(rand, 1)[0]);
            }
            
            if (availableHard.length > 0) {
                const rand = Math.floor(Math.random() * availableHard.length);
                selected.push(availableHard.splice(rand, 1)[0]);
            }
            
            while (selected.length < 5) {
                const allAvailable = questions.filter(q => 
                    !selected.includes(q) && available(q)
                );
                if (allAvailable.length === 0) break;
                const rand = Math.floor(Math.random() * allAvailable.length);
                selected.push(allAvailable[rand]);
            }
            
            return selected;
        }
        
        // 显示题目
        function showQuestion() {
            currentQuestion = todayQuestions[currentIndex];
            selectedOption = null;
            
            const questionCard = document.getElementById('questionCard');
            questionCard.style.display = 'block';
            
            const difficultyText = {
                'easy': '简单',
                'medium': '中等',
                'hard': '困难'
            };
            
            document.getElementById('questionNumber').innerHTML = 
                `第 ${currentIndex + 1} 题 / 共 ${todayQuestions.length} 题 
                <span class="badge badge-${currentQuestion.difficulty}">${difficultyText[currentQuestion.difficulty]}</span>`;
            
            document.getElementById('questionText').textContent = currentQuestion.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const optionLabels = ['A', 'B', 'C', 'D'];
            currentQuestion.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = `${optionLabels[index]}. ${option}`;
                div.onclick = () => selectOption(index, div);
                optionsContainer.appendChild(div);
            });
            
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('checkBtn').style.display = 'block';
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('nextBtn').style.display = 'none';
        }
        
        // 选择选项
        function selectOption(index, element) {
            selectedOption = index;
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            element.classList.add('selected');
            document.getElementById('checkBtn').disabled = false;
        }
        
        // 检查答案
        function checkAnswer() {
            const correctAnswer = currentQuestion.answer;
            const optionLabels = ['A', 'B', 'C', 'D'];
            const selectedAnswer = optionLabels[selectedOption];
            
            const options = document.querySelectorAll('.option');
            const isCorrect = selectedAnswer === correctAnswer;
            
            options.forEach((opt, index) => {
                if (optionLabels[index] === correctAnswer) {
                    opt.classList.add('correct');
                } else if (index === selectedOption && !isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            document.getElementById('explanationText').textContent = 
                `正确答案: ${correctAnswer}\n\n${currentQuestion.explanation}`;
            document.getElementById('explanation').style.display = 'block';
            
            const data = getStorageData();
            data.todayCompleted++;
            data.totalCompleted++;
            data.completedQuestions.push(currentQuestion.id);
            data.recentQuestions.push({
                id: currentQuestion.id,
                date: Date.now()
            });
            
            if (!isCorrect) {
                data.mistakes.push({
                    id: currentQuestion.id,
                    question: currentQuestion.question,
                    correctAnswer: correctAnswer,
                    userAnswer: selectedAnswer,
                    date: Date.now()
                });
            }
            
            saveStorageData(data);
            updateStats();
            
            document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        // 下一题
        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= todayQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        // 显示结果
        function showResult() {
            document.getElementById('startCard').style.display = 'none';
            document.getElementById('questionCard').style.display = 'none';
            const resultCard = document.getElementById('resultCard');
            resultCard.style.display = 'block';
            
            const data = getStorageData();
            document.getElementById('resultDetail').textContent = 
                `今日已完成 ${data.todayCompleted} 题，总计完成 ${data.totalCompleted} 题`;
        }
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('dailyMode').style.display = mode === 'daily' ? 'block' : 'none';
            document.getElementById('mistakesMode').style.display = mode === 'mistakes' ? 'block' : 'none';
            
            if (mode === 'mistakes') {
                initMistakesMode();
            }
        }
        
        // 初始化错题模式
        function initMistakesMode() {
            const data = getStorageData();
            const hasMistakes = data.mistakes.length > 0;
            
            document.getElementById('mistakeStartText').textContent = 
                hasMistakes ? `共有 ${data.mistakes.length} 道错题` : '暂无错题，继续加油！';
            
            document.getElementById('startMistakeBtn').style.display = hasMistakes ? 'block' : 'none';
            document.getElementById('mistakeStartCard').style.display = 'block';
            document.getElementById('mistakeQuestionCard').style.display = 'none';
            document.getElementById('mistakesSection').style.display = 'none';
            
            if (hasMistakes) {
                showMistakes();
            }
        }
        
        // 显示错题本
        function showMistakes() {
            const data = getStorageData();
            const mistakesSection = document.getElementById('mistakesSection');
            
            if (data.mistakes.length === 0) {
                mistakesSection.innerHTML = '<p style="text-align:center;color:#6c757d;padding:40px">暂无错题，继续加油！</p>';
                return;
            }
            
            let html = `
                <h3>❌ 错题列表</h3>
                <div class="mistakes-actions">
                    <button class="btn btn-primary btn-small" onclick="practiceSelected()">练习选中错题</button>
                    <button class="btn btn-danger btn-small" onclick="deleteSelected()">删除选中错题</button>
                    <button class="btn btn-secondary btn-small" onclick="printMistakes()">打印错题</button>
                </div>
            `;
            
            data.mistakes.slice(-20).reverse().forEach((mistake, index) => {
                const fullQuestion = questions.find(q => q.id === mistake.id);
                let optionsHTML = '';
                if (fullQuestion && fullQuestion.options) {
                    optionsHTML = fullQuestion.options.map((opt, i) => 
                        `<div style="margin: 3px 0; color: #555;">${optionLabels[i]}. ${opt}</div>`
                    ).join('');
                }
                
                html += `
                    <div class="mistake-item">
                        <input type="checkbox" class="mistake-checkbox" data-id="${mistake.id}">
                        <div class="mistake-content">
                            <div class="mistake-question">${data.mistakes.length - index}. ${mistake.question}</div>
                            <div style="margin-top: 8px; padding-left: 10px;">${optionsHTML}</div>
                            <div class="mistake-answer">
                                你的答案: ${mistake.userAnswer} | 正确答案: ${mistake.correctAnswer}
                            </div>

                        </div>
                    </div>
                `;
            });
            
            mistakesSection.innerHTML = html;
            mistakesSection.style.display = 'block';
        }
        
        // 获取选中的错题ID
        function getSelectedMistakeIds() {
            const checkboxes = document.querySelectorAll('.mistake-checkbox:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
        }
        
        // 练习选中的错题
        function practiceSelected() {
            const selectedIds = getSelectedMistakeIds();
            
            if (selectedIds.length === 0) {
                alert('请先勾选要练习的错题');
                return;
            }
            
            const data = getStorageData();
            mistakeQuestions = selectedIds.map(id => {
                return questions.find(q => q.id === id);
            }).filter(q => q);
            
            if (mistakeQuestions.length === 0) {
                alert('没有找到选中的题目');
                return;
            }
            
            mistakeIndex = 0;
            document.getElementById('mistakeStartCard').style.display = 'none';
            document.getElementById('mistakesSection').style.display = 'none';
            showMistakeQuestion();
        }
        
        // 删除选中的错题
        function deleteSelected() {
            const selectedIds = getSelectedMistakeIds();
            
            if (selectedIds.length === 0) {
                alert('请先勾选要删除的错题');
                return;
            }
            
            if (!confirm(`确定要删除 ${selectedIds.length} 道错题吗？`)) {
                return;
            }
            
            const data = getStorageData();
            data.mistakes = data.mistakes.filter(m => !selectedIds.includes(m.id));
            saveStorageData(data);
            updateStats();
            
            alert(`已删除 ${selectedIds.length} 道错题`);
            initMistakesMode();
        }
        
        // 打印错题
        function printMistakes() {
            const selectedIds = getSelectedMistakeIds();
            const data = getStorageData();
            
            let mistakesToPrint = data.mistakes;
            if (selectedIds.length > 0) {
                mistakesToPrint = data.mistakes.filter(m => selectedIds.includes(m.id));
            }
            
            if (mistakesToPrint.length === 0) {
                alert('没有可打印的错题');
                return;
            }
            
            // 创建打印窗口
            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                alert('打印窗口被浏览器阻止，请允许弹窗后重试');
                return;
            }
            
            let printHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>错题打印 - 祖源语法学习系统</title>
                    <style>
                        body {
                            font-family: "Microsoft YaHei", Arial, sans-serif;
                            padding: 20px;
                            max-width: 800px;
                            margin: 0 auto;
                        }
                        h1 {
                            text-align: center;
                            border-bottom: 2px solid #333;
                            padding-bottom: 10px;
                        }
                        .mistake-item {
                            margin-bottom: 30px;
                            page-break-inside: avoid;
                            border: 1px solid #ddd;
                            padding: 15px;
                            border-radius: 5px;
                        }
                        .mistake-number {
                            font-weight: bold;
                            font-size: 16px;
                            margin-bottom: 10px;
                        }
                        .mistake-question {
                            font-size: 15px;
                            line-height: 1.8;
                            margin-bottom: 10px;
                        }
                        .mistake-answer {
                            font-size: 14px;
                            color: #666;
                            margin-top: 10px;
                            padding-top: 10px;
                            border-top: 1px dashed #ddd;
                        }
                        .print-date {
                            text-align: center;
                            color: #999;
                            margin-top: 30px;
                            font-size: 12px;
                        }
                        @media print {
                            .mistake-item {
                                page-break-inside: avoid;
                            }
                        }
                    </style>
                </head>
                <body>
                    <h1>📚 祖源语法错题集</h1>
            `;
            
            mistakesToPrint.forEach((mistake, index) => {
                // 从原始题目数据中获取完整信息
                const fullQuestion = questions.find(q => q.id === mistake.id);
                let optionsHTML = '';
                
                if (fullQuestion && fullQuestion.options) {
                    optionsHTML = fullQuestion.options.map((opt, i) => 
                        `<div style="margin: 5px 0;">${optionLabels[i]}. ${opt}</div>`
                    ).join('');
                }
                
                printHTML += `
                    <div class="mistake-item">
                        <div class="mistake-number">第 ${index + 1} 题</div>
                        <div class="mistake-question">${mistake.question}</div>
                        <div style="margin-top: 10px;">${optionsHTML}</div>
                        <div style="margin-top: 10px; padding: 8px; background: #f0f0f0; border-radius: 3px;">
                            <strong>正确答案：${mistake.correctAnswer}</strong>
                        </div>
                    </div>
                `;
            });
            
            printHTML += `
                <div class="print-date">
                    打印时间：${new Date().toLocaleString('zh-CN')}
                </div>
                </body>
                </html>
            `;
            
            printWindow.document.write(printHTML);
            printWindow.document.close();
            printWindow.print();
        }
        
        // 开始错题练习
        function startMistakePractice() {
            const data = getStorageData();
            
            // 获取所有错题对应的完整题目
            mistakeQuestions = data.mistakes.map(mistake => {
                return questions.find(q => q.id === mistake.id);
            }).filter(q => q); // 过滤掉undefined
            
            if (mistakeQuestions.length === 0) {
                alert('没有错题可练习');
                return;
            }
            
            mistakeIndex = 0;
            document.getElementById('mistakeStartCard').style.display = 'none';
            document.getElementById('mistakesSection').style.display = 'none';
            showMistakeQuestion();
        }
        
        // 显示错题
        function showMistakeQuestion() {
            currentMistakeQuestion = mistakeQuestions[mistakeIndex];
            selectedMistakeOption = null;
            
            const questionCard = document.getElementById('mistakeQuestionCard');
            questionCard.style.display = 'block';
            
            document.getElementById('mistakeQuestionNumber').textContent = 
                `错题 ${mistakeIndex + 1} / ${mistakeQuestions.length}`;
            
            document.getElementById('mistakeQuestionText').textContent = currentMistakeQuestion.question;
            
            const optionsContainer = document.getElementById('mistakeOptionsContainer');
            optionsContainer.innerHTML = '';
            
            const optionLabels = ['A', 'B', 'C', 'D'];
            currentMistakeQuestion.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = `${optionLabels[index]}. ${option}`;
                div.onclick = () => selectMistakeOption(index, div);
                optionsContainer.appendChild(div);
            });
            
            document.getElementById('mistakeExplanation').style.display = 'none';
            document.getElementById('mistakeCheckBtn').style.display = 'block';
            document.getElementById('mistakeCheckBtn').disabled = true;
            document.getElementById('mistakeNextBtn').style.display = 'none';
            document.getElementById('backToMistakesBtn').style.display = 'none';
        }
        
        // 选择错题选项
        function selectMistakeOption(index, element) {
            selectedMistakeOption = index;
            
            document.querySelectorAll('#mistakeOptionsContainer .option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            element.classList.add('selected');
            document.getElementById('mistakeCheckBtn').disabled = false;
        }
        
        // 检查错题答案
        function checkMistakeAnswer() {
            const correctAnswer = currentMistakeQuestion.answer;
            const optionLabels = ['A', 'B', 'C', 'D'];
            const selectedAnswer = optionLabels[selectedMistakeOption];
            
            const options = document.querySelectorAll('#mistakeOptionsContainer .option');
            const isCorrect = selectedAnswer === correctAnswer;
            
            options.forEach((opt, index) => {
                if (optionLabels[index] === correctAnswer) {
                    opt.classList.add('correct');
                } else if (index === selectedMistakeOption && !isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            document.getElementById('mistakeExplanationText').textContent = 
                `正确答案: ${correctAnswer}\n\n${currentMistakeQuestion.explanation}`;
            document.getElementById('mistakeExplanation').style.display = 'block';
            
            // 如果答对了，从错题本移除
            if (isCorrect) {
                const data = getStorageData();
                data.mistakes = data.mistakes.filter(m => m.id !== currentMistakeQuestion.id);
                saveStorageData(data);
                updateStats();
            }
            
            document.getElementById('mistakeCheckBtn').style.display = 'none';
            document.getElementById('mistakeNextBtn').style.display = 'block';
            document.getElementById('backToMistakesBtn').style.display = 'block';
        }
        
        // 下一道错题
        function nextMistakeQuestion() {
            mistakeIndex++;
            
            if (mistakeIndex >= mistakeQuestions.length) {
                alert('🎉 所有错题练习完成！');
                backToMistakes();
            } else {
                showMistakeQuestion();
            }
        }
        
        // 返回错题本
        function backToMistakes() {
            initMistakesMode();
        }
        
        // 重做单个错题
        function retryMistake(questionId) {
            const question = questions.find(q => q.id === questionId);
            if (!question) {
                alert('题目不存在');
                return;
            }
            
            mistakeQuestions = [question];
            mistakeIndex = 0;
            
            document.getElementById('mistakeStartCard').style.display = 'none';
            document.getElementById('mistakesSection').style.display = 'none';
            showMistakeQuestion();
        }
        
        window.onload = loadQuestions;
    </script>
</body>
</html>
